<!DOCTYPE html>
<html>
<head>
    <title>Kautuka AI Chatbot</title>
    <style>
        body {
            background-color: #0f0f1a;
            font-family: Arial;
            margin: 0;
            padding: 0;
        }

        /* Chatbot Button */
        #chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }

        /* Chatbot Box */
        #chat-box {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            background-color: #16213e;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header */
        #chat-header {
            background-color: #e94560;
            padding: 15px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        /* Messages */
        #chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user-msg {
            background-color: #e94560;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .ai-msg {
            background-color: #0f3460;
            color: white;
        }

        /* Input */
        #chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #0f3460;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            background-color: #16213e;
            color: white;
        }

        #send-btn {
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Main Page -->
    <div style="text-align:center; padding: 100px; color: white;">
        <h1 style="color: #e94560;">🤖 Kautuka Durga</h1>
        <h2>AI Developer | Web Developer</h2>
        <p style="color: #aaa;">Click the button below to chat with my AI!</p>
    </div>

    <!-- Chat Button -->
    <button id="chat-btn" onclick="toggleChat()">
        💬 Chat with AI
    </button>

    <!-- Chat Box -->
    <div id="chat-box">
        <div id="chat-header">
            🤖 Kautuka AI Assistant
        </div>
        <div id="chat-messages">
            <div class="message ai-msg">
                Namaste! Main Kautuka ka AI hun! 
                Kaise madad kar sakta hun? 😊
            </div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" 
                   placeholder="Kuch poochho..." 
                   onkeypress="if(event.key=='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Chatbot responses
        var responses = {
            "hello": "Hello! Kaise ho aap? 😊",
            "hi": "Hi! Main aapki kaise madad kar sakta hun?",
            "name": "Mera naam Kautuka AI hai!",
            "help": "Main AI websites aur chatbots banata hun!",
            "python": "Python mein expert hun main!",
            "ai": "AI development meri specialty hai!",
            "website": "Main professional websites bana sakta hun!",
            "price": "Mere packages $80 se shuru hote hain!",
            "contact": "fiverr.com/kautukadurga pe contact karo!",
            "work": "AI websites, chatbots aur data analysis!",
            "bye": "Alvida! Fiverr pe milte hain! 👋"
        };

        function toggleChat() {
            var box = document.getElementById('chat-box');
            if (box.style.display === 'none' || box.style.display === '') {
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function sendMessage() {
            var input = document.getElementById('chat-input');
            var messages = document.getElementById('chat-messages');
            var userText = input.value.trim();

            if (!userText) return;

            // User message
            messages.innerHTML += '<div class="message user-msg">' + userText + '</div>';

            // AI response
            var aiReply = "Interesting! Fiverr pe message karo: fiverr.com/kautukadurga 😊";
            var lowerText = userText.toLowerCase();

            for (var key in responses) {
                if (lowerText.includes(key)) {
                    aiReply = responses[key];
                    break;
                }
            }

            setTimeout(function() {
                messages.innerHTML += '<div class="message ai-msg">🤖 ' + aiReply + '</div>';
                messages.scrollTop = messages.scrollHeight;
            }, 500);

            input.value = '';
            messages.scrollTop = messages.scrollHeight;
        }
    </script>

</body>
</html>
